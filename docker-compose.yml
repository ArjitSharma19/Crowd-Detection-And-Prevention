services:
  mongo:
    image: mongo:latest
    container_name: crowdshield-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  crowdshield-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crowdshield-ai
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - RELOAD=false
      - MONGO_URI=mongodb://mongo:27017/crowdshield
      - VIDEO_SOURCE=/app/data/tesr_video_5.mp4
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    restart: unless-stopped

volumes:
  mongo-data:

